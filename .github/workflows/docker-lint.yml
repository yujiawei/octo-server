name: Docker Lint

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker/**'
      - '.hadolint.yaml'
      - '.github/workflows/docker-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker/**'
      - '.hadolint.yaml'
      - '.github/workflows/docker-lint.yml'

jobs:
  docker-lint:
    uses: Mininglamp-OSS/.github/.github/workflows/reusable-docker-lint.yml@v1
    # Ref: Mininglamp-OSS workflow optimization T11
