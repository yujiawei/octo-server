name: Octo CI Status

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: read

jobs:
  notify:
    uses: Mininglamp-OSS/.github/.github/workflows/octo-ci-status.yml@v1
    with:
      repo_name: ${{ github.event.workflow_run.repository.name }}
      workflow_name: ${{ github.event.workflow_run.name }}
      conclusion: ${{ github.event.workflow_run.conclusion }}
      run_id: ${{ github.event.workflow_run.id }}
      run_url: ${{ github.event.workflow_run.html_url }}
      project_group_id: "9ea115c7462b4b45b8c85d07d07e0dde"
      workflow_id: ${{ github.event.workflow_run.workflow_id }}
    secrets:
      OCTO_BOT_TOKEN: ${{ secrets.OCTO_BOT_TOKEN }}
