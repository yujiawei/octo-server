# Caller workflow: drop into each repo at .github/workflows/pr-merged-done.yml
# When a PR is merged, delegate to the org-level reusable workflow which moves
# every issue closed by the PR to "Done" on Project Board #2.
#
# Known limitations:
#   - Only "Closes/Fixes/Resolves #N" in the PR body is scanned; commit message keywords are not.
#   - Cross-repo closing references (e.g. owner/other-repo#N) are not yet supported.
#   - Only PRs merged into the repository's default branch trigger the board update,
#     since GitHub only auto-closes linked issues when merging to the default branch.
#
# Uses pull_request_target so org secrets (PROJECT_TOKEN) are available even for
# fork PRs. Safe here because this workflow does not check out PR code; it only
# reads the PR payload to drive a Projects v2 GraphQL mutation.
name: PR Merged → Board Done

on:
  pull_request_target:
    types: [closed]

jobs:
  move-to-done:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == github.event.repository.default_branch
    uses: Mininglamp-OSS/.github/.github/workflows/pr-merged-done.yml@main
    secrets:
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
