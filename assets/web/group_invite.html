<!DOCTYPE html>
<html>
<head>
    <title>群邀请</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex,nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }
        .container { max-width: 420px; margin: 0 auto; padding: 0 16px; }
        .card { margin-top: 32px; padding: 24px 20px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .avatar { width: 72px; height: 72px; border-radius: 12px; background: #e6e6e6; object-fit: cover; display: block; margin: 0 auto 12px; }
        .group-name { font-size: 18px; font-weight: 600; color: #222; line-height: 1.4; word-break: break-all; }
        .meta { font-size: 13px; color: #999; margin-top: 6px; }
        .tip { font-size: 14px; color: #666; line-height: 1.6; margin-top: 16px; }
        .btn-group { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
        .btn {
            height: 44px; border: none; border-radius: 22px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:active { opacity: 0.7; }
        .btn[disabled], .btn.disabled { opacity: 0.5; pointer-events: none; }
        .btn-primary { background: #07c160; color: #fff; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 12px; line-height: 18px; margin-top: 8px;
        }
        .badge-warn { background: #fff3e0; color: #f57c00; }
        .toast {
            position: fixed; left: 50%; top: 32px; transform: translateX(-50%);
            padding: 10px 16px; border-radius: 8px; font-size: 14px;
            background: rgba(0,0,0,0.78); color: #fff; z-index: 1000;
            max-width: 80%; text-align: center; display: none;
        }
        .loading { text-align: center; padding: 80px 20px; color: #999; font-size: 15px; }
        .state-page { text-align: center; padding: 64px 20px; display: none; }
        .state-page .icon { font-size: 48px; margin-bottom: 16px; }
        .state-page .title { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .state-page .desc { font-size: 14px; color: #999; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div class="container">
        <div id="loading" class="loading">加载中...</div>

        <div id="content" style="display:none">
            <div class="card">
                <img class="avatar" id="v-avatar" alt="" />
                <div class="group-name" id="v-name"></div>
                <div class="meta" id="v-meta"></div>
                <div class="badge badge-warn" id="v-badge" style="display:none"></div>
                <div class="tip" id="v-tip" style="display:none"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="btn-join" style="display:none">加入群聊</button>
                <a class="btn btn-primary" id="btn-open" href="#">打开 App</a>
                <a class="btn btn-secondary" id="btn-download" href="#" target="_blank" rel="noopener">下载 App</a>
            </div>
        </div>

        <div class="state-page" id="state-expired">
            <div class="icon">⏰</div>
            <div class="title">邀请链接已过期</div>
            <div class="desc">请联系群成员重新分享邀请链接</div>
        </div>

        <div class="state-page" id="state-not-found">
            <div class="icon">🚫</div>
            <div class="title">群聊不存在或已解散</div>
            <div class="desc">请确认链接是否正确</div>
        </div>

        <div class="state-page" id="state-joined">
            <div class="icon">✅</div>
            <div class="title">加入成功</div>
            <div class="desc">即将返回首页...</div>
        </div>
    </div>

<script>
var API_BASE = "{{API_BASE_URL}}";
var code = new URLSearchParams(location.search).get("code") || "";
var currentGroupNo = "";
var currentStatus = "";

function show(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = "block";
}
function hide(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = "none";
}

function showState(stateID) {
    hide("loading");
    hide("content");
    show(stateID);
}

function toast(msg, ms) {
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.style.display = "block";
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { el.style.display = "none"; }, ms || 2200);
}

// 从 localStorage 抓 Web 客户端的登录 token（与 dmwork-web 的 InviteLanding 逻辑一致，
// key 形如 "token{sid}"）。保持纯只读，不依赖框架。
function findToken() {
    try {
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.indexOf("token") === 0 && key !== "tokenCallback") {
                var val = localStorage.getItem(key);
                if (val && val.length > 10) return val;
            }
        }
    } catch (e) { /* Safari 隐私模式等 */ }
    return "";
}

function findSid() {
    try {
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.indexOf("token") === 0 && key !== "tokenCallback") {
                var val = localStorage.getItem(key);
                if (val && val.length > 10) return key.substring(5);
            }
        }
    } catch (e) { /* ignore */ }
    return "";
}

function renderInfo(data) {
    currentGroupNo = data.group_no || "";
    currentStatus = data.status || "";

    document.getElementById("v-name").textContent = data.group_name || "群聊";
    if (typeof data.member_count === "number") {
        document.getElementById("v-meta").textContent = "共 " + data.member_count + " 人";
    }
    if (data.avatar) {
        document.getElementById("v-avatar").src = API_BASE + "/v1/" + data.avatar;
    }
    // 邀请确认开启时，禁用「打开 App」按钮，提示在 App 内由管理员审批
    if (data.status === "invite_required") {
        var badge = document.getElementById("v-badge");
        badge.textContent = "需管理员审批";
        badge.style.display = "inline-block";
        var tip = document.getElementById("v-tip");
        tip.textContent = "该群已开启邀请确认，请在 App 内由管理员审批后入群。";
        tip.style.display = "block";
    }
    // 「打开 App」走深链：App 注册 dmwork:// scheme 后由系统拉起
    var openBtn = document.getElementById("btn-open");
    openBtn.href = "dmwork://group/invite?code=" + encodeURIComponent(code);
    // 「下载 App」回退到产品官网（无独立配置时复用 BaseURL）
    document.getElementById("btn-download").href = API_BASE;

    // Web 已登录 & 群可直接入群 → 显示「加入群聊」按钮
    // invite_required 场景仍交由 App 内审批，不在落地页直接入群
    if (data.status === "joinable" && findToken()) {
        var joinBtn = document.getElementById("btn-join");
        joinBtn.style.display = "flex";
        joinBtn.addEventListener("click", onJoinClick);
    }

    hide("loading");
    show("content");
}

function onJoinClick() {
    var btn = document.getElementById("btn-join");
    if (btn.disabled) return;
    btn.disabled = true;
    btn.textContent = "正在加入...";

    var token = findToken();
    if (!token) {
        toast("请先登录 Web 端后再加入群聊");
        btn.disabled = false;
        btn.textContent = "加入群聊";
        return;
    }

    // 1. 用公开 code 换出当前登录用户的 auth_code
    fetch(API_BASE + "/v1/group/invite/authorize?code=" + encodeURIComponent(code), {
        method: "POST",
        headers: { "token": token }
    }).then(function (r) {
        return r.json().then(function (d) { return { ok: r.ok, data: d }; });
    }).then(function (r) {
        if (!r.ok || !r.data || !r.data.auth_code || !r.data.group_no) {
            throw new Error((r.data && r.data.msg) || "邀请链接已过期");
        }
        var groupNo = r.data.group_no;
        var authCode = r.data.auth_code;
        // 2. 复用和移动端一致的入群接口，内部已覆盖外部成员 / allow_external / invite 校验
        return fetch(API_BASE + "/v1/groups/" + encodeURIComponent(groupNo) +
                     "/scanjoin?auth_code=" + encodeURIComponent(authCode), {
            method: "GET",
            headers: { "token": token }
        }).then(function (r2) {
            return r2.text().then(function (txt) {
                var msg = "";
                try { msg = (JSON.parse(txt) || {}).msg || ""; } catch (e) { /* ignore */ }
                return { ok: r2.ok, msg: msg };
            });
        });
    }).then(function (r) {
        if (!r.ok) {
            throw new Error(r.msg || "加入失败");
        }
        // 3. 入群成功：提示 + 跳回 Web 首页（带 sid 保证登录态可恢复）
        toast("加入成功");
        showState("state-joined");
        setTimeout(function () {
            try {
                var sid = findSid();
                var basePath = window.location.pathname.replace(/\/+$/, '').replace(/\/v1\/group\/invite$/, '');
                var target = window.location.origin + (basePath || "/") + (sid ? "?sid=" + encodeURIComponent(sid) : "");
                window.location.href = target;
            } catch (e) {
                window.location.href = "/";
            }
        }, 1200);
    }).catch(function (err) {
        toast((err && err.message) || "加入失败");
        btn.disabled = false;
        btn.textContent = "加入群聊";
    });
}

if (!code) {
    showState("state-expired");
} else {
    fetch(API_BASE + "/v1/group/invite/detail?code=" + encodeURIComponent(code))
        .then(function(r) {
            return r.json().then(function(d) { return { ok: r.ok, data: d }; });
        })
        .then(function(r) {
            if (!r.ok) {
                showState("state-expired");
                return;
            }
            switch (r.data.status) {
                case "joinable":
                case "invite_required":
                    renderInfo(r.data);
                    break;
                case "not_found":
                    showState("state-not-found");
                    break;
                case "expired":
                default:
                    showState("state-expired");
                    break;
            }
        })
        .catch(function() {
            showState("state-expired");
        });
}
</script>
</body>
</html>
