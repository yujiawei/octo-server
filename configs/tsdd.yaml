##################### 文件服务 ####################
# Note: For browser-direct upload via presigned PUT, the object-storage
# bucket must allow PUT from the octo-web origin. For Aliyun OSS this is a
# CORS rule on the bucket (Aliyun OSS console → 权限管理 → 跨域设置).
# The same caveat applies to MinIO and Tencent COS whenever the upload host
# differs from the octo-web origin (e.g. files.example.com vs octo.example.com).
# Without the CORS rule the browser will block the PUT before it ever leaves
# the page, regardless of how the URL was signed.
#
# SigV4 / OSS signed-header contract — REQUIRED for the browser:
#
# `GET /v1/file/upload-credentials` (modules/file/api.go getUploadCredentials)
# returns `contentType` and (when set) `contentDisposition`. The browser
# MUST echo them as the matching PUT request headers — they are covered by
# the canonical-headers section of the SigV4 signature (and the OSS
# equivalent), so any deviation produces `403 SignatureDoesNotMatch` at
# upload time. This is enforced at the storage layer; no server-side retry
# can rescue a client that does not echo them.
#
# Presigned-URL support matrix (current as of the file/presigned-URL implementation):
#
#   fileService value | presigned PUT (browser direct upload) | presigned GET (signed download)
#   ------------------+---------------------------------------+--------------------------------
#   "minio"           | yes — direct PUT signed by minio-go   | yes — signed GET via minio-go
#   "tencentCOS"      | yes — direct PUT signed by minio-go   | yes — signed GET via minio-go
#   "aliyunOSS"       | yes — direct PUT signed by OSS SDK    | yes — signed GET via OSS SDK
#   "qiniu"           | no  — Qiniu uploads use a token+form  | yes — MakePrivateURLv2 signed URL
#                     |       model that does not map to a    |
#                     |       single PUT URL                  |
#   "seaweedFS"       | no  — no presign primitive in SDK     | no  — public reads are unsigned
#
# Fallback when a backend does not support a presigned operation: the server
# returns a clear error from the corresponding endpoint, and clients should
# fall back to the regular server-side upload flow (POST /file/upload) or
# unsigned DownloadURL. Switch to MinIO/COS/OSS for browser-direct upload.
#fileService: "minio" # 文件服务 minio or aliyunOSS or seaweedFS or qiniu
#minio: # minio配置
#  url: "" # minio地址 格式：http://xx.xx.xx.xx:9000 (server-internal endpoint)
#  uploadURL: ""    # 可选：服务端上传基地址，留空则回退到 url。仅服务端使用。
#  downloadURL: ""  # 浏览器可访问的 MinIO 基地址，用于签发预签名 PUT/GET URL。
#                   # SigV4 将 host 与 canonical URI 纳入签名，因此该值必须就是
#                   # 浏览器实际请求的主机；留空则回退到 url，仅当 Go 进程与浏览器
#                   # 使用同一 DNS 视图时可用。
#                   #
#                   # 严格契约：downloadURL 必须是 scheme://host[:port]，不允许带
#                   # 路径前缀。带路径的值（如 https://octo.example.com/minio）会
#                   # 在签名时被显式拒绝——这种形态在标准的 nginx
#                   # `proxy_pass <upstream>/` 路由下无法工作（前缀会被剥掉，
#                   # 网关侧看到的 canonical URI 与 SigV4 签名时的不一致）。
#                   #
#                   # 典型取值：
#                   #   http://octo.local:29000              # docker-compose 直接暴露 MinIO API 端口
#                   #   https://minio.octo.example.com       # 独立子域名直指 MinIO API（需 DNS+证书）
#                   #   http://minio.local:9000              # 局域网内直连 MinIO
#                   #
#                   # 不支持（启动/首次签名时报错）：
#                   #   https://octo.example.com/minio       # nginx 路径前缀代理
#  accessKeyID: "" # minio accessKeyID
#  secretAccessKey: ""  # minio secretAccessKey
#oss:  # aliyun oss配置
#  endpoint: "" # oss endpoint 例如 oss-cn-hangzhou.aliyuncs.com
#  bucketURL: "" # oss bucketURL 例如 https://xxxx.oss-cn-hangzhou.aliyuncs.com
#  accessKeyID: "" # oss accessKeyID
#  accessKeySecret: "" # oss accessKeySecret
#seaweed: # seaweed配置
#  url: ""   # seaweed地址 格式：http://xx.xx.xx.xx:9000
#qiniu:            # 七牛云配置
#  url: ""         # 七牛云对象存储请求域名，例：http://cdn.tsdaodao.com
#  bucketName: ""  # 七牛云对象存储 bucket空间名称
#  accessKey: ""   # 七牛云密钥 AccessKey
#  secretKey: ""   # 七牛云密钥 secretKey

