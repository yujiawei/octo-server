# -----------------------------------------------------------------------------
# OCTO Server · top-level nginx config
# -----------------------------------------------------------------------------
# Kept deliberately small. Site-specific routing lives in conf.d/octo.conf and
# is rendered by nginx's env-var substitution entrypoint (see compose volume
# mount: conf.d is mapped to /etc/nginx/templates).
# -----------------------------------------------------------------------------

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip (aligned with the legacy reference config).
    gzip  on;
    gzip_min_length  1k;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  2;
    gzip_buffers     16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Render templates from /etc/nginx/templates/*.template → /etc/nginx/conf.d/
    # (nginx official image does this automatically on container start).
    include /etc/nginx/conf.d/*.conf;
}
